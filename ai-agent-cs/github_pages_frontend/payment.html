<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment — Luxury Hotel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            max-width: 520px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: none;
        }
        .loading { font-size: 18px; color: #d4af37; text-align: center; }
        .error { color: #ff5252; text-align: center; display: none; }
        .hotel-name { font-size: 14px; text-transform: uppercase; letter-spacing: 3px; color: #d4af37; margin-bottom: 6px; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .subtitle { font-size: 14px; color: #aaa; margin-bottom: 30px; }
        .summary-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 12px; padding: 14px 20px; margin-bottom: 28px;
        }
        .summary-room { font-weight: 600; color: #fff; }
        .summary-price { font-size: 22px; font-weight: 700; color: #d4af37; }
        .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #d4af37; margin-bottom: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 6px; }
        input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 15px;
            font-family: 'Inter', sans-serif; transition: border 0.3s;
        }
        input:focus { outline: none; border-color: #d4af37; }
        input::placeholder { color: #666; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .btn {
            display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #1a1a2e; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .secure-note { text-align: center; margin-top: 16px; font-size: 12px; color: #777; }
        .secure-note span { color: #4caf50; }

        /* Success overlay */
        .success-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15,12,41,0.95);
            z-index: 100; align-items: center; justify-content: center; flex-direction: column;
        }
        .success-overlay.active { display: flex; }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-title { font-size: 28px; font-weight: 700; color: #4caf50; margin-bottom: 10px; }
        .success-text { font-size: 16px; color: #ccc; text-align: center; max-width: 400px; line-height: 1.6; }
        .conf-number { font-size: 20px; font-weight: 700; color: #d4af37; margin-top: 16px; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading payment details...</div>
    <div id="error" class="error">
        <h1>Error</h1>
        <p>Booking not found or connection failed.</p>
    </div>

    <div class="card" id="paymentCard">
        <p class="hotel-name">✦ Luxury Hotel</p>
        <h1>Complete Payment</h1>
        <p class="subtitle"><span id="room_name"></span> · <span id="nights"></span> night(s)</p>

        <div class="summary-bar">
            <span class="summary-room"><span id="check_in"></span> → <span id="check_out"></span></span>
            <span class="summary-price" id="total_price"></span>
        </div>

        <form id="paymentForm">
            <p class="section-title">Card Information</p>
            <div class="form-group">
                <label for="card_name">Name on Card</label>
                <input type="text" id="card_name" name="card_name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" name="card_number" placeholder="4242 4242 4242 4242" maxlength="19" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <button type="submit" class="btn" id="payButton">Pay <span></span> →</button>
            <p class="secure-note"><span>🔒</span> Your payment is secure and encrypted</p>
        </form>
    </div>

    <!-- Success Screen -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✅</div>
        <div class="success-title">Payment Successful!</div>
        <div class="success-text">
            Your booking for the <strong id="success_room_name"></strong> has been confirmed.<br>
            A confirmation email will be sent to <strong id="success_guest_email"></strong>.
        </div>
        <div class="conf-number" id="confirmation_number"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Try to get API URL from the 'api' parameter in the link. 
        // If not found, use a safe default (localhost).
        const API_BASE_URL = urlParams.get('api') || 'http://localhost:8000';

        let currentBookingId = null;

        async function loadPayment() {
            currentBookingId = urlParams.get('id');

            if (!currentBookingId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/booking/${currentBookingId}`);
                if (!response.ok) throw new Error('Booking not found');
                
                const data = await response.json();

                document.getElementById('room_name').innerText = data.display_name;
                document.getElementById('nights').innerText = data.nights || 0;
                document.getElementById('check_in').innerText = data.check_in || 'N/A';
                document.getElementById('check_out').innerText = data.check_out || 'N/A';
                document.getElementById('total_price').innerText = `€${data.total_price || 0}`;
                document.getElementById('payButton').querySelector('span').innerText = `€${data.total_price || 0}`;

                // Prep success screen data
                document.getElementById('success_room_name').innerText = data.display_name;
                document.getElementById('success_guest_email').innerText = data.guest_email || 'your email';
                document.getElementById('confirmation_number').innerText = `Confirmation #LH-${currentBookingId}`;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('paymentCard').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('payButton');
            btn.disabled = true;
            btn.innerText = 'Processing...';

            try {
                const res = await fetch(`${API_BASE_URL}/api/booking/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: parseInt(currentBookingId) })
                });

                if (res.ok) {
                    document.getElementById('successOverlay').classList.add('active');
                } else {
                    alert('Payment processing failed. Please try again.');
                    btn.disabled = false;
                    btn.innerText = 'Pay Again';
                }
            } catch (err) {
                console.error(err);
                alert('Network error. Make sure the backend server and CORS are running.');
                btn.disabled = false;
                btn.innerText = 'Pay Again';
            }
        });

        document.getElementById('card_number').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
            e.target.value = v.match(/.{1,4}/g)?.join(' ') || '';
        });

        window.onload = loadPayment;
    </script>
</body>
</html>
